---
- name: Setup Identity Stack (Authentik)
  hosts: dockerhost
  become: true

  vars_files:
    - _vars_common.yml

  tasks:
    - name: Sync Authentik
      synchronize:
        src: "../../dockerhost/auth/authentik/"
        dest: "{{ auth_dir }}/authentik/"
        recursive: true
        rsync_opts:
          - "--exclude=.env"
          - "--exclude=media/"
          - "--exclude=custom-templates/"

    - name: Gerar .env do Authentik
      copy:
        dest: "{{ auth_dir }}/authentik/.env"
        content: |
          AUTHENTIK_SECRET_KEY={{ authentik_secret_key }}
          POSTGRES_PASSWORD={{ authentik_db_password }}
          AUTHENTIK_REDIS__HOST=redis
          AUTHENTIK_POSTGRESQL__HOST=postgresql
          AUTHENTIK_POSTGRESQL__USER=authentik
          AUTHENTIK_POSTGRESQL__NAME=authentik
        owner: fajre
        group: docker
        mode: "0600"
        force: true
      notify: Recreate Authentik

    - name: Start Authentik
      community.docker.docker_compose_v2:
        project_src: "{{ auth_dir }}/authentik"
        state: present

  handlers:
    - name: Recreate Authentik
      community.docker.docker_compose_v2:
        project_src: "{{ auth_dir }}/authentik"
        state: present
        recreate: always
