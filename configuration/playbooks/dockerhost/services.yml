---
- name: Setup Application Services
  hosts: dockerhost
  become: true

  vars_files:
    - _vars_common.yml

  vars_prompt:
    - name: vaultwarden_role_id
      prompt: "VAULTWARDEN RoleID"
      private: true
    - name: vaultwarden_secret_id
      prompt: "VAULTWARDEN SecretID"
      private: true
    - name: tududi_email
      prompt: "Tududi email do Admin (ex: fajre@home.local)"
      private: false
    - name: tududi_password
      prompt: "Tudidi senha do Admin"
      private: true
    - name: tududi_secret
      prompt: "Tududi Session Secret (String longa aleatória)"
      private: true
    - name: speedtest_app_key
      prompt: "Speedtest Tracker APP_KEY (base64:...)"
      private: true

  tasks:
    # --- WHOAMI ---
    - name: Sync Whoami
      synchronize:
        src: "../../dockerhost/services/whoami/"
        dest: "{{ base_dir }}/whoami/"
        recursive: true

    - name: Start Whoami
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/whoami"
        state: present

    # --- NOSTR ---
    - name: Sync Nostr Stack
      synchronize:
        src: "../../dockerhost/services/nostr/"
        dest: "{{ base_dir }}/nostr/"
        delete: true
        recursive: true
        rsync_opts:
          - "--chmod=D0755,F0644"
          - "--chown={{ ansible_user }}:{{ ansible_user }}"
          - "--exclude=tor-keys/**"

    - name: Corrigir permissões da pasta Tor Keys
      file:
        path: "{{ base_dir }}/nostr/tor-keys"
        state: directory
        owner: "root"
        group: "root"
        mode: '0700'

    - name: Start Nostr Stack
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/nostr"
        state: present

    # --- VAULTWARDEN ---
    - name: Sync Vaultwarden
      synchronize:
        src: "../../dockerhost/services/vaultwarden/"
        dest: "{{ base_dir }}/vaultwarden/"
        recursive: true
        rsync_opts:
          - "--exclude=.env"
          - "--exclude=data/"

    - name: Tornar script start-with-vault executável
      file:
        path: "{{ base_dir }}/vaultwarden/start-with-vault.sh"
        mode: '0755'

    - name: Gravar Vaultwarden RoleID
      copy:
        content: "{{ vaultwarden_role_id }}"
        dest: "/etc/vault/vaultwarden.roleid"
        owner: root
        group: root
        mode: '0600'
    - name: Gravar Vaultwarden SecretID
      copy:
        content: "{{ vaultwarden_secret_id }}"
        dest: "/etc/vault/vaultwarden.secretid"
        owner: root
        group: root
        mode: '0600'

    - name: Instalar Vaultwarden Systemd Service
      copy:
        src: "../../dockerhost/services/vaultwarden/vaultwarden-vault.service"
        dest: "/etc/systemd/system/vaultwarden-vault.service"
        mode: '0644'
      notify: Reload Systemd

    - name: Habilitar e Iniciar Vaultwarden com Vault
      service:
        name: vaultwarden-vault
        state: started
        enabled: true

    # --- ACTUAL BUDGET ---
    - name: Sync Actual Budget
      synchronize:
        src: "../../dockerhost/services/actualbudget/"
        dest: "{{ base_dir }}/actualbudget/"
        recursive: true
        rsync_opts:
          - "--chmod=D0755,F0644"
          - "--chown={{ ansible_user }}:{{ ansible_user }}"
          - "--exclude=data/"

    - name: Garantir diretório de dados do Actual Budget
      file:
        path: "{{ base_dir }}/actualbudget/data"
        state: directory
        mode: '0755'
        owner: "root"
        group: "root"

    - name: Start Actual Budget
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/actualbudget"
        state: present

    # --- SYNCTHING ---
    - name: Sync Syncthing Config
      synchronize:
        src: "../../dockerhost/services/syncthing/"
        dest: "{{ base_dir }}/syncthing/"
        recursive: true
        rsync_opts:
          - "--chmod=D0755,F0644"
          - "--chown={{ ansible_user }}:{{ ansible_user }}"
          - "--exclude=config/" # Preserva configs geradas pelo app

    - name: Garantir permissões na pasta de Config
      file:
        path: "{{ base_dir }}/syncthing/config"
        state: directory
        owner: "1000" # usuário fajre
        group: "1000"
        mode: '0755'
        recurse: true

    - name: Garantir permissões no Mountpoint de Dados
      file:
        path: "/mnt/syncthing"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'

    - name: Start Syncthing
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/syncthing"
        state: present

    # --- Tududi ---
    - name: Sync Tududi
      synchronize:
        src: "../../dockerhost/services/tududi/"
        dest: "{{ base_dir }}/tududi/"
        recursive: true
        rsync_opts:
          - "--exclude=.env"
          - "--exclude=data/"

    - name: Garantir diretórios de dados do Tududi (Prevenção de Permissão)
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'
      loop:
        - "{{ base_dir }}/tududi/data/db"
        - "{{ base_dir }}/tududi/data/uploads"

    - name: Gerar .env do Tududi
      copy:
        dest: "{{ base_dir }}/tududi/.env"
        content: |
          TUDUDI_USER_EMAIL={{ tududi_email }}
          TUDUDI_USER_PASSWORD={{ tududi_password }}
          TUDUDI_SESSION_SECRET={{ tududi_secret }}
        owner: "1000"
        group: "1000"
        mode: '0600'
        force: true

    - name: Start Tududi
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/tududi"
        state: present

    # --- FILE BROWSER ---
    - name: Sync File Browser
      synchronize:
        src: "../../dockerhost/services/filebrowser/"
        dest: "{{ base_dir }}/filebrowser/"
        recursive: true
        rsync_opts:
          - "--chmod=D0755,F0644"
          - "--chown={{ ansible_user }}:{{ ansible_user }}"
          - "--exclude=data/"
          - "--exclude=config/"

    - name: Garantir diretórios e permissões do File Browser
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000" # Crucial para o container conseguir criar o filebrowser.db
        group: "1000"
        mode: '0755'
      loop:
        - "{{ base_dir }}/filebrowser/data"
        - "{{ base_dir }}/filebrowser/config"

    - name: Start File Browser
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/filebrowser"
        state: present

    # --- MINECRAFT ---
    - name: Sync Minecraft
      synchronize:
        src: "../../dockerhost/services/minecraft/"
        dest: "{{ base_dir }}/minecraft/"
        recursive: true
        rsync_opts:
          - "--chmod=D0755,F0644"
          - "--chown={{ ansible_user }}:{{ ansible_user }}"
          - "--exclude=data/"

    - name: Garantir diretório de dados do Minecraft
      file:
        path: "{{ base_dir }}/minecraft/data"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'

    - name: Start Minecraft
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/minecraft"
        state: present

    # --- SPEEDTEST TRACKER ---
    - name: Sync Speedtest Tracker
      synchronize:
        src: "../../dockerhost/services/speedtest-tracker/"
        dest: "{{ base_dir }}/speedtest-tracker/"
        recursive: true
        rsync_opts:
          - "--chmod=D0755,F0644"
          - "--chown={{ ansible_user }}:{{ ansible_user }}"
          - "--exclude=.env"
          - "--exclude=data/"

    - name: Garantir diretório de dados do Speedtest Tracker
      file:
        path: "{{ base_dir }}/speedtest-tracker/data"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'

    - name: Gerar .env do Speedtest Tracker
      copy:
        dest: "{{ base_dir }}/speedtest-tracker/.env"
        content: |
          APP_KEY={{ speedtest_app_key }}
          APP_URL=https://speedtest-tracker.home
          ASSET_URL=https://speedtest-tracker.home
        owner: "1000"
        group: "1000"
        mode: '0600'
        force: true

    - name: Start Speedtest Tracker
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}/speedtest-tracker"
        state: present

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: true
