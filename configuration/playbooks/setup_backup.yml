---
- name: Configurar Backup Automático com Restic (Auditado)
  hosts: all
  become: true

  tasks:
    # --- 1. INSTALAÇÃO ---
    - name: Instalar Restic (Debian)
      apt:
        name: restic
        state: present
      when: ansible_os_family == "Debian"

    - name: Instalar Restic (Alpine)
      apk:
        name: restic
        state: present
      when: ansible_os_family == "Alpine"

    # --- 2. SCRIPTS DE BACKUP ---

    # DOCKERHOST (Com Dump Consistente do PostgreSQL)
    - name: Script Backup DockerHost
      copy:
        dest: "/usr/local/bin/backup-daily.sh"
        mode: '0700'
        content: |
          #!/bin/bash
          source /etc/restic-env.sh

          echo "--> [DockerHost] 1. Dump do Banco Authentik..."

          # Tenta fazer o dump. O nome do container DEVE ser exato.
          # Se o comando falhar, o script avisa mas continua o backup dos arquivos (melhor algo que nada).
          if docker exec authentik-postgres pg_dump -U authentik authentik > /opt/auth/authentik/authentik_dump.sql; then
              echo "    Sucesso: Dump SQL gerado em /opt/auth/authentik/authentik_dump.sql"
          else
              echo "    ERRO CRÍTICO: Falha ao gerar dump do PostgreSQL. O banco pode estar inconsistente."
          fi

          echo "--> [DockerHost] 2. Backup Restic iniciado..."

          # O Restic agora vai copiar o arquivo .sql gerado acima, garantindo um restore fácil.
          restic backup /opt/services /opt/auth /opt/monitoring /opt/security /opt/utils /mnt/syncthing/Mirror \
            --exclude="*.log" \
            --exclude="*.sqlite3-wal" \
            --tag "dockerhost"

          restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune
      when: "'dockerhost' in group_names"

    # ADGUARD
    - name: Script Backup AdGuard
      copy:
        dest: "/usr/local/bin/backup-daily.sh"
        mode: '0700'
        content: |
          #!/bin/sh
          . /etc/restic-env.sh
          echo "--> [AdGuard] Backup iniciado..."

          restic backup /opt/AdGuardHome \
            --exclude="*.log" \
            --tag "adguard"

          restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune
      when: "'adguard' in group_names"

    # MANAGEMENT
    - name: Script Backup Management
      copy:
        dest: "/usr/local/bin/backup-daily.sh"
        mode: '0700'
        content: |
          #!/bin/sh
          . /etc/restic-env.sh
          echo "--> [Management] Backup iniciado..."

          # Backup do repositório Git central e chaves SSH
          restic backup /opt/homelab /root/.ssh \
            --exclude=".git" \
            --tag "management"

          restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune
      when: "'management' in group_names"

    # ORANGESHADOW (Bitcoin/Electrs/Monero)
    - name: Script Backup OrangeShadow
      copy:
        dest: "/usr/local/bin/backup-daily.sh"
        mode: '0700'
        content: |
          #!/bin/bash
          source /etc/restic-env.sh

          echo "--> [OrangeShadow] Iniciando Backup..."

          # Bitcoin e Tor: Apenas Configurações (SEM WALLET.DAT)
          if [ -d "/home/fajre/.bitcoin" ]; then
              restic backup /home/fajre/.bitcoin/bitcoin.conf \
                            /etc/systemd/system/bitcoind.service \
                            /etc/tor/torrc \
                            --tag "bitcoin-config"
          fi

          # Electrs: Configuração e Limites de Memória
          if [ -d "/home/fajre/.electrs" ]; then
              restic backup /home/fajre/.electrs/config.toml \
                            /etc/systemd/system/electrs.service \
                            --tag "electrs-config"
          fi

          # Monero: Apenas Configurações também
          if [ -d "/home/fajre/.bitmonero" ]; then
              restic backup /home/fajre/.bitmonero/bitmonero.conf \
                            /etc/systemd/system/monerod.service \
                            --tag "monero-config"
          fi

          # Limpeza de retenção
          restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune
      when: "'orangeshadow' in group_names"

    # --- 3. AGENDAMENTO ---
    # Correção: Lógica inline para evitar erro de indentação YAML
    - name: Configurar Cronjob
      cron:
        name: "Backup Diario Restic"
        minute: "{{ cron_min }}"
        hour: "4"
        job: "/usr/local/bin/backup-daily.sh >> /var/log/backup-restic.log 2>&1"
      vars:
        cron_min: "{{ '00' if 'dockerhost' in group_names else '30' if 'adguard' in group_names else '45' }}"
