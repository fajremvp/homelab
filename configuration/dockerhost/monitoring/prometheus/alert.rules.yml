groups:
  - name: infra_alerts
    rules:
      # Alerta Crítico: Se qualquer servidor (Job) cair por 1 min
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instância {{ $labels.instance }} está DOWN"
          description: "O alvo {{ $labels.instance }} do job {{ $labels.job }} não responde há mais de 1 minuto."

      # Espaço em Disco: Aviso com menos de 10% livre
      - alert: HostOutOfDiskSpace
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 10 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} sem espaço"
          description: "Disco com menos de 10% livre ({{ $value | printf \"%.2f\" }}%)"

      # RAM Crítica: Acima de 90%
      - alert: HostHighRamUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} RAM Crítica"
          description: "Uso de RAM acima de 90% ({{ $value | printf \"%.2f\" }}%)"

      # CPU Alta: Média acima de 90% por 10 min
      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} CPU Alta"
          description: "CPU acima de 90% por 10 minutos."

  - name: pve_alerts
    rules:
      # Alerta de Vida ou Morte do Monitoramento
      - alert: PveExporterDown
        expr: up{job="proxmox-ve"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PVE Exporter Inacessível"
          description: "O container exporter caiu ou o Proxmox rejeitou a senha."

      # CPU Alta em VM/LXC (Acima de 90% da capacidade alocada por 5m)
      # rate() calcula a velocidade do uso por segundo.
      # Se uma VM tem 2 vCores e usa 1.8 vCores/s, isso é 90%.
      - alert: PveGuestHighCpu
        expr: (rate(pve_guest_cpu_usage_seconds_total[5m]) / pve_guest_cpu_count) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VM {{ $labels.name }} ({{ $labels.vmid }}) fritando CPU"
          description: "Uso de CPU acima de 90% por 5 minutos."

      # RAM Alta em VM/LXC (Acima de 90% do limite)
      # Gauge direto: Uso / Limite
      - alert: PveGuestHighMem
        expr: (pve_guest_memory_usage_bytes / pve_guest_memory_limit_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VM {{ $labels.name }} ({{ $labels.vmid }}) sem RAM"
          description: "Uso de memória atingiu {{ $value | printf \"%.1f\" }}% do limite."

  - name: ups_power_alerts
    rules:
      # Alerta de Falta de Energia (On Battery)
      - alert: UpsOnBattery
        expr: network_ups_tools_ups_status{flag="OB"} == 1
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Blecaute: Servidor operando na Bateria"
          description: "O fornecimento de energia da rua foi interrompido. O Nobreak assumiu a carga com sucesso."

      # Alerta de Pré-Desligamento (Gordura antes do FSD)
      - alert: UpsBatteryCriticalWarning
        expr: network_ups_tools_battery_charge < 55
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Bateria Atingindo Limite Crítico"
          description: "Bateria em {{ $value | printf \"%.1f\" }}%. O procedimento de Disaster Recovery (FSD) será iniciado automaticamente ao atingir 50%."

      # Alerta de Sobrecarga de Hardware
      - alert: UpsOverload
        expr: network_ups_tools_ups_load > 85
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "🔥 Perigo: UPS em Sobrecarga"
          description: "A carga conectada ao Nobreak excedeu 85% (Atual: {{ $value | printf \"%.1f\" }}%). O equipamento pode desarmar para proteção."

      # Alerta de Manutenção Física (Replace Battery)
      - alert: UpsReplaceBattery
        expr: network_ups_tools_ups_status{flag="RB"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "🛠️ Manutenção do Nobreak Necessária"
          description: "O auto-teste do UPS falhou. As baterias internas estão degradadas e precisam ser substituídas."

      # Cegueira de Telemetria
      - alert: UpsTelemetryDown
        expr: up{job="ups-intelbras"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "🔌 Perda de Telemetria L3 do UPS"
          description: "O Prometheus não consegue ler o nut-exporter, ou o RPi perdeu conexão com o Nobreak."
