# --- Armazenamento ---
data-dir=/opt/blockchain/monero
log-file=/opt/blockchain/monero/bitmonero.log
log-level=0

# --- Rede P2P (Fase 3: IBD Clearnet) ---
p2p-bind-ip=0.0.0.0
p2p-bind-port=18080
out-peers=32
# Modo parasita (igual ao BTC): não servir blocos para a rede enquanto não terminar o download
in-peers=0
# Desativa a abertura de portas automática no roteador (UPnP) para segurança
no-igd=1

# --- RPC (Interface Local) ---
rpc-bind-ip=127.0.0.1
rpc-bind-port=18081
restricted-rpc=1

# --- Otimizações Extremas de I/O (LMDB) ---
# Libera gravação assíncrona no disco em lotes de 250MB.
db-sync-mode=fast:async:250000000bytes
fast-block-sync=1
prep-blocks-threads=4
